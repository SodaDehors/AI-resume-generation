# AI Resume Generator — Nginx Reverse Proxy
# Place at: /etc/nginx/sites-available/ai-resume
# Then: ln -s /etc/nginx/sites-available/ai-resume /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;   # ← 替换为你的域名

    # 上传大小限制
    client_max_body_size 5m;

    # 静态文件直接由 Nginx 服务（不走 Flask）
    location /static/ {
        alias /opt/ai-resume/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 其他所有请求代理给 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接优化（生成简历可能耗时较长）
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
