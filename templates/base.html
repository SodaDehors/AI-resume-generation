<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI简历生成系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="/" class="nav-logo">🤖 AI简历生成器</a>
            <div class="nav-links">
                <a href="/form" class="nav-link">创建简历</a>
                {% if session.get('generated_resume') %}
                <a href="/preview" class="nav-link">预览简历</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>AI简历生成系统 — 机器学习课程项目 &copy; 2026</p>
            <p class="footer-sub">Powered by LLM · 支持 Claude / OpenAI / 规则引擎</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
